<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar — OECE Simulacro</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="login-page">

  <!-- Toggle dark/light flotante -->
  <div style="position:fixed; top:18px; right:18px; display:flex; align-items:center; gap:8px; z-index:100;">
    <span id="theme-icon" style="font-size:0.85rem;">🌙</span>
    <button class="theme-toggle" id="theme-toggle" title="Cambiar modo"></button>
  </div>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">OE</div>
      <h1 class="login-title">OECE Simulacro</h1>
      <p class="login-sub">Ley de Contrataciones N° 32069</p>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label class="form-label" for="login-dni">DNI / Usuario</label>
      <input type="text" id="login-dni" class="form-input" placeholder="Tu número de DNI" autocomplete="username" />
    </div>
    <div class="form-group">
      <label class="form-label" for="login-pass">Contraseña</label>
      <input type="password" id="login-pass" class="form-input" placeholder="Tu contraseña" autocomplete="current-password" />
    </div>

    <button id="btn-login" class="btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
      Ingresar al simulacro
    </button>

    <p style="text-align:center; margin-top:20px; font-size:0.84rem; color:var(--text-soft);">
      ¿No tienes cuenta?
      <a href="https://wa.me/51964310396?text=Hola,%20quiero%20inscribirme%20al%20simulacro%20OECE" target="_blank" style="color:var(--azul); font-weight:600; display:inline-flex; align-items:center; gap:4px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Inscríbete vía WhatsApp
      </a>
    </p>
    <p style="text-align:center; margin-top:10px;">
      <a href="index.html" style="color:var(--text-soft); font-size:0.8rem; text-decoration:none;">← Volver al inicio</a>
    </p>
  </div>
</div>

<script>
const html   = document.documentElement;
const toggle = document.getElementById('theme-toggle');
const icon   = document.getElementById('theme-icon');
const saved  = localStorage.getItem('oece-theme') || 'light';
html.setAttribute('data-theme', saved);
icon.textContent = saved === 'dark' ? '☀️' : '🌙';
toggle.addEventListener('click', () => {
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  icon.textContent = next === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('oece-theme', next);
});
</script>

<script type="module">
  import { loginUser, getSession } from './js/auth.js';
  const session = getSession();
  if (session) window.location.href = session.isAdmin ? 'admin.html' : 'alumno.html';

  const btnLogin = document.getElementById('btn-login');
  const errorMsg = document.getElementById('error-msg');

  async function doLogin() {
    const dni  = document.getElementById('login-dni').value.trim();
    const pass = document.getElementById('login-pass').value;
    errorMsg.style.display = 'none';
    if (!dni || !pass) { errorMsg.textContent = 'Completa todos los campos.'; errorMsg.style.display = 'block'; return; }
    btnLogin.disabled = true; btnLogin.textContent = 'Verificando...';
    const result = await loginUser(dni, pass);
    if (result.success) {
      window.location.href = result.role === 'admin' ? 'admin.html' : 'alumno.html';
    } else {
      errorMsg.textContent = result.error; errorMsg.style.display = 'block';
      btnLogin.disabled = false; btnLogin.textContent = 'Ingresar al simulacro';
    }
  }
  btnLogin.addEventListener('click', doLogin);
  document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
