<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ingresar — OECE Simulacro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#000; --bg2:#0A0A0A; --bg3:#111; --border:#1F1F1F;
      --text:#fff; --muted:#888; --dim:#444; --red:#C8191E;
    }
    [data-theme="light"] {
      --bg:#fff; --bg2:#F8F8F8; --bg3:#F0F0F0; --border:#E5E5E5;
      --text:#000; --muted:#666; --dim:#999;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      -webkit-font-smoothing:antialiased;
      transition:background .3s,color .3s;
    }
    body::before{
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:linear-gradient(var(--border) 1px,transparent 1px),
        linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:60px 60px; opacity:.4;
    }
    [data-theme="light"] body::before{opacity:.2;}

    /* Toggle */
    .toggle-wrap{position:fixed;top:18px;right:20px;z-index:10;display:flex;align-items:center;gap:7px;}
    .t-icon{font-size:.75rem;color:var(--muted);}
    .t-btn{width:36px;height:20px;background:var(--border);border:1px solid var(--dim);
      border-radius:20px;cursor:pointer;position:relative;transition:background .2s;}
    .t-btn::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;
      background:var(--muted);border-radius:50%;transition:transform .2s,background .2s;}
    [data-theme="light"] .t-btn{background:#000;border-color:#000;}
    [data-theme="light"] .t-btn::after{transform:translateX(16px);background:#fff;}

    /* Card */
    .login-wrap{position:relative;z-index:1;width:100%;max-width:380px;padding:20px;}
    .login-card{
      background:var(--bg2); border:1px solid var(--border);
      border-radius:14px; padding:36px 32px;
    }
    .login-logo-wrap{text-align:center;margin-bottom:28px;}
    .login-logo{
      width:52px;height:52px;background:var(--red);border-radius:10px;
      display:inline-flex;align-items:center;justify-content:center;
      font-weight:800;font-size:1rem;color:#fff;margin-bottom:14px;
    }
    .login-title{font-size:1.25rem;font-weight:700;letter-spacing:-.02em;color:var(--text);}
    .login-sub{font-size:.75rem;color:var(--muted);margin-top:4px;}

    .form-group{margin-bottom:14px;}
    .form-label{display:block;font-size:.68rem;font-weight:600;letter-spacing:.1em;
      text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
    .form-input{
      width:100%;background:var(--bg3);border:1px solid var(--border);
      border-radius:8px;padding:11px 13px;color:var(--text);
      font-family:'Inter',sans-serif;font-size:.9rem;transition:border-color .2s;
    }
    .form-input:focus{outline:none;border-color:var(--text);}
    .form-input::placeholder{color:var(--dim);}

    .error-msg{background:rgba(200,25,30,.1);border-left:3px solid var(--red);
      color:var(--red);padding:10px 13px;border-radius:6px;font-size:.83rem;
      margin-bottom:14px;display:none;}

    .btn-login{
      width:100%;background:var(--text);color:var(--bg);
      border:none;border-radius:8px;padding:13px;
      font-family:'Inter',sans-serif;font-size:.88rem;font-weight:600;
      cursor:pointer;transition:opacity .2s;margin-top:6px;
    }
    .btn-login:hover{opacity:.85;}
    .btn-login:disabled{opacity:.5;cursor:not-allowed;}

    .login-footer{text-align:center;margin-top:20px;font-size:.78rem;color:var(--muted);}
    .login-footer a{color:var(--text);text-decoration:none;font-weight:500;}
    .login-footer a:hover{opacity:.7;}
    .login-back{display:block;text-align:center;margin-top:12px;font-size:.73rem;
      color:var(--dim);text-decoration:none;}
    .login-back:hover{color:var(--muted);}
  </style>
</head>
<body>

<div class="toggle-wrap">
  <span class="t-icon" id="t-icon">☀️</span>
  <button class="t-btn" id="t-btn"></button>
</div>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo-wrap">
      <div class="login-logo">OE</div>
      <div class="login-title">OECE Simulacro</div>
      <div class="login-sub">Ley de Contrataciones N° 32069</div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label class="form-label" for="login-dni">DNI / Usuario</label>
      <input type="text" id="login-dni" class="form-input" placeholder="Tu número de DNI" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="login-pass">Contraseña</label>
      <input type="password" id="login-pass" class="form-input" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button id="btn-login" class="btn-login">Ingresar al simulacro</button>

    <div class="login-footer">
      ¿Sin cuenta?
      <a href="https://wa.me/51964310396?text=Hola,%20quiero%20inscribirme%20al%20simulacro%20OECE" target="_blank">Inscríbete vía WhatsApp →</a>
    </div>
    <a href="index.html" class="login-back">← Volver al inicio</a>
  </div>
</div>

<script>
const html=document.documentElement,btn=document.getElementById('t-btn'),icon=document.getElementById('t-icon');
const saved=localStorage.getItem('oece-theme')||'dark';
html.setAttribute('data-theme',saved);
icon.textContent=saved==='dark'?'☀️':'🌙';
btn.addEventListener('click',()=>{
  const next=html.getAttribute('data-theme')==='dark'?'light':'dark';
  html.setAttribute('data-theme',next);
  icon.textContent=next==='dark'?'☀️':'🌙';
  localStorage.setItem('oece-theme',next);
});
</script>

<script type="module">
  import { loginUser, getSession } from './js/auth.js';
  const session=getSession();
  if(session) window.location.href=session.isAdmin?'admin.html':'alumno.html';
  const btnL=document.getElementById('btn-login');
  const errEl=document.getElementById('error-msg');
  async function doLogin(){
    const dni=document.getElementById('login-dni').value.trim();
    const pass=document.getElementById('login-pass').value;
    errEl.style.display='none';
    if(!dni||!pass){errEl.textContent='Completa todos los campos.';errEl.style.display='block';return;}
    btnL.disabled=true;btnL.textContent='Verificando...';
    const r=await loginUser(dni,pass);
    if(r.success){window.location.href=r.role==='admin'?'admin.html':'alumno.html';}
    else{errEl.textContent=r.error;errEl.style.display='block';btnL.disabled=false;btnL.textContent='Ingresar al simulacro';}
  }
  btnL.addEventListener('click',doLogin);
  document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
