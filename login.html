<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingresar — OECE Simulacro</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">OE</div>
      <h1 class="login-title">OECE Simulacro</h1>
      <p class="login-sub">Ley de Contrataciones 32069</p>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label class="form-label" for="login-dni">DNI / Usuario</label>
      <input type="text" id="login-dni" class="form-input" placeholder="Tu número de DNI" autocomplete="username" />
    </div>
    <div class="form-group">
      <label class="form-label" for="login-pass">Contraseña</label>
      <input type="password" id="login-pass" class="form-input" placeholder="Tu contraseña" autocomplete="current-password" />
    </div>

    <button id="btn-login" class="btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
      Ingresar al simulacro
    </button>

    <p style="text-align:center; margin-top:20px; font-size:0.85rem; color:var(--gris-suave);">
      ¿No tienes cuenta?
      <a href="https://wa.me/51964310396?text=Hola,%20quiero%20inscribirme%20al%20simulacro%20OECE" target="_blank" style="color:var(--dorado);">Inscríbete vía WhatsApp</a>
    </p>

    <p style="text-align:center; margin-top:12px;">
      <a href="index.html" style="color:var(--gris-suave); font-size:0.82rem; text-decoration:none;">← Volver al inicio</a>
    </p>
  </div>
</div>

<script type="module">
  import { loginUser } from './js/auth.js';
  import { getSession } from './js/auth.js';

  // Si ya tiene sesión activa, redirigir
  const session = getSession();
  if (session) {
    window.location.href = session.isAdmin ? 'admin.html' : 'alumno.html';
  }

  const btnLogin = document.getElementById('btn-login');
  const errorMsg = document.getElementById('error-msg');

  async function doLogin() {
    const dni = document.getElementById('login-dni').value.trim();
    const pass = document.getElementById('login-pass').value;
    errorMsg.style.display = 'none';

    if (!dni || !pass) {
      errorMsg.textContent = 'Completa todos los campos.';
      errorMsg.style.display = 'block'; return;
    }

    btnLogin.disabled = true;
    btnLogin.textContent = 'Verificando...';

    const result = await loginUser(dni, pass);

    if (result.success) {
      window.location.href = result.role === 'admin' ? 'admin.html' : 'alumno.html';
    } else {
      errorMsg.textContent = result.error;
      errorMsg.style.display = 'block';
      btnLogin.disabled = false;
      btnLogin.textContent = 'Ingresar al simulacro';
    }
  }

  btnLogin.addEventListener('click', doLogin);
  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
